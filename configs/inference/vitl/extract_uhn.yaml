# Extraction config for EchoJEPA-L (ViT-L) on UHN 18M dataset
# Used by: python -m evals.extract_uhn_embeddings --config THIS_FILE --data CSV --output_dir DIR --devices cuda:0..7

experiment:
  data:
    dataset_type: VideoDataset
    resolution: 224
    frames_per_clip: 16
    frame_step: 2
    num_segments: 1
    num_views_per_segment: 1

model_kwargs:
  checkpoint: "/mnt/custom-file-systems/efs/fs-0049217cdf69186d7_fsap-0fa7145b64eaa046b/vjepa2/checkpoints/anneal/keep/vitl-pt-210-an25.pt"
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_large
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
