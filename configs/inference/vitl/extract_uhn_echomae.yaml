# Extraction config for EchoMAE-L (VideoMAE ViT-L) on UHN 18M dataset
# Used by: python -m evals.extract_uhn_embeddings --config THIS_FILE --data CSV --output_dir DIR --devices cuda:0..7

experiment:
  data:
    dataset_type: VideoDataset
    resolution: 224
    frames_per_clip: 16
    frame_step: 2
    num_segments: 1
    num_views_per_segment: 1

model_kwargs:
  checkpoint: "/mnt/custom-file-systems/efs/fs-0049217cdf69186d7_fsap-0fa7145b64eaa046b/vjepa2/checkpoints/videomae-ep163.pt"
  module_name: evals.video_classification_frozen.modelcustom.videomae_encoder
  pretrain_kwargs:
    encoder:
      model_name: vit_large_patch16_224
      tubelet_size: 2
  wrapper_kwargs: {}
