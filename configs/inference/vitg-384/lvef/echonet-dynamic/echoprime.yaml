# INFERENCE CONFIG
app: vjepa
cpus_per_task: 32
# Output folder for inference logs (separate from training to avoid overwrite)
folder: /home/sagemaker-user/user-default-efs/vjepa2/evals/vitg-384/lvef_inference
mem_per_gpu: 80G
nodes: 1
tasks_per_node: 8
num_workers: 8

# Use the same evaluation infrastructure
eval_name: video_classification_frozen
resume_checkpoint: true # <--- CHANGE THIS TO TRUE, OTHERWISE RANDOM WEIGHTS
# Use a new tag for inference results
tag: echoprime-echonet-lvef-test

# --- CRITICAL INFERENCE SETTINGS ---
val_only: true
# Path where the predictions CSV will be saved
predictions_save_path: /home/sagemaker-user/user-default-efs/vjepa2/predictions/echoprime-echonet-lvef-test.csv

# POINT THIS TO YOUR TRAINED PROBE CHECKPOINT
# Based on your previous config, it should be here:
probe_checkpoint: /home/sagemaker-user/user-default-efs/vjepa2/checkpoints/eval_probes/lvef/echonet-dynamic/echoprime.pt

experiment:
  classifier:
    task_type: regression
    num_heads: 16
    num_probe_blocks: 4
    num_targets: 1

  data:
    dataset_type: VideoDataset
    # Point 'dataset_val' to your TEST CSV
    dataset_val:   /home/sagemaker-user/user-default-efs/vjepa2/data/csv/echonet_dynamic_test.csv
    # Train path is ignored in val_only mode, but usually required by config parser
    dataset_train: /home/sagemaker-user/user-default-efs/vjepa2/data/csv/echonet_dynamic_test.csv
    
    resolution: 224  
    frames_per_clip: 16  
    frame_step: 2  
    num_segments: 2  
    num_views_per_segment: 1  

    target_mean: 55.7776
    target_std: 12.4064

    # IMPORTANT: avoid ImageNet normalization; wrapper applies EchoPrime normalization
    normalization:
      - [0.0, 0.0, 0.0]
      - [1.0, 1.0, 1.0]

  optimization:
    # You can increase batch size for inference since gradients are off
    batch_size: 4
    
    # Zero out learning rates for safety (though val_only prevents updates anyway)
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.0
      lr: 0.0
      start_lr: 0.0
      warmup: 0.0
      weight_decay: 0.0

    num_epochs: 1 # Run once
    use_bfloat16: true
    use_pos_embed: false

model_kwargs:
  # Set to null so the wrapper looks for weights in 'wrapper_kwargs' or default root
  checkpoint: null 
  
  # [FIX 1] Point to your custom EchoPrime module
  module_name: evals.video_classification_frozen.modelcustom.echo_prime_encoder
  
  pretrain_kwargs: {}
  
  # [FIX 2] Use the arguments your custom init_module expects
  wrapper_kwargs:
    echo_prime_root: /home/sagemaker-user/user-default-efs/vjepa2/evals/video_classification_frozen/modelcustom/EchoPrime
    force_fp32: true
    bin_size: 50