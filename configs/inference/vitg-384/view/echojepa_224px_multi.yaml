# INFERENCE CONFIG for UHN22K probe  
app: vjepa  
cpus_per_task: 32  
folder: /mnt/custom-file-systems/efs/fs-0049217cdf69186d7_fsap-0fa7145b64eaa046b/vjepa2/evals/vitg-384/classifier  
mem_per_gpu: 80G  
nodes: 1  
tasks_per_node: 8  
num_workers: 8  
  
eval_name: video_classification_frozen  
resume_checkpoint: true  
tag: uhn22k-classifier-echojepa-224px-multi
val_only: true  # Critical: enables inference-only mode  
predictions_save_path: /home/sagemaker-user/user-default-efs/vjepa2/predictions/uhn22k-classifier-echojepa-224px-multi.csv  # NEW
probe_checkpoint: /home/sagemaker-user/user-default-efs/vjepa2/checkpoints/eval_probes/classification/echojepa_224px_multi.pt
  
experiment:  
  classifier:  
    num_heads: 16  
    num_probe_blocks: 4  
  
  data:  
    dataset_type: VideoDataset  
    dataset_train: /home/sagemaker-user/user-default-efs/vjepa2/data/csv/uhn_views_22k_test.csv  # CHANGE DATASET
    dataset_val:   /home/sagemaker-user/user-default-efs/vjepa2/data/csv/uhn_views_22k_test.csv   # CHANGE DATASET
    num_classes: 13  # CHANGE NUM CLASSES
    resolution: 224  
    frames_per_clip: 16  
    frame_step: 2  
    num_segments: 2  
    num_views_per_segment: 1  

  optimization:
    # You can increase batch size for inference since gradients are off
    batch_size: 4
    
    # Zero out learning rates for safety (though val_only prevents updates anyway)
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.0
      lr: 0.0
      start_lr: 0.0
      warmup: 0.0
      weight_decay: 0.0

    num_epochs: 1 # Run once
    use_bfloat16: true
    use_pos_embed: false

model_kwargs:
  # Keep identical to training
  checkpoint: "/home/sagemaker-user/user-default-efs/vjepa2/checkpoints/anneal/keep/pt-280-an81.pt"
  # module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip_multilevel
  
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_giant_xformers
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
      
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
    out_layers: [24, 29, 34, 39]