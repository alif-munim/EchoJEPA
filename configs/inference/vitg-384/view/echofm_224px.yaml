# INFERENCE CONFIG for EchoFM (ViT-L MAE pretrained on 290K echo clips)
app: vjepa
cpus_per_task: 32
folder: /mnt/custom-file-systems/efs/fs-0049217cdf69186d7_fsap-0fa7145b64eaa046b/vjepa2/evals/vitg-384/classifier
mem_per_gpu: 80G
nodes: 1
tasks_per_node: 8
num_workers: 8

eval_name: video_classification_frozen
resume_checkpoint: true
tag: mimic-echofm-224px
val_only: true

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4

  data:
    dataset_type: VideoDataset
    dataset_train: /home/sagemaker-user/user-default-efs/vjepa2/data/csv/uhn_views_22k_test.csv
    dataset_val:   /home/sagemaker-user/user-default-efs/vjepa2/data/csv/uhn_views_22k_test.csv
    num_classes: 13
    resolution: 224
    frames_per_clip: 16
    frame_step: 2
    num_segments: 2
    num_views_per_segment: 1

  optimization:
    batch_size: 4
    multihead_kwargs:
    - final_lr: 0.0
      final_weight_decay: 0.0
      lr: 0.0
      start_lr: 0.0
      warmup: 0.0
      weight_decay: 0.0
    num_epochs: 1
    use_bfloat16: true

model_kwargs:
  checkpoint: /mnt/custom-file-systems/efs/fs-0049217cdf69186d7_fsap-0fa7145b64eaa046b/vjepa2/evals/video_classification_frozen/modelcustom/EchoFM/weights/EchoFM/EchoFM_latest.pth
  module_name: evals.video_classification_frozen.modelcustom.echofm_encoder
  pretrain_kwargs:
    encoder:
      embed_dim: 1024
      depth: 24
      num_heads: 16
      patch_size: 16
      num_frames: 32
      t_patch_size: 4
  wrapper_kwargs: {}
