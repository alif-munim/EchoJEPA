# A4C — RV Systolic Function (binary) • Frozen probe • ViT-G • BS=48/GPU
# Full dataset. No focal loss / class weights; val/test at natural prevalence.
# LR band scaled for larger batch (Option A) + short warmup. Checkpoint = e141.

app: vjepa
cpus_per_task: 32
folder: /home/sagemaker-user/user-default-efs/vjepa2/evals/vitg-384/a4c_rv_rvsf_bsz48_full
mem_per_gpu: 80G
nodes: 1
tasks_per_node: 8
num_workers: 14

eval_name: video_classification_frozen
resume_checkpoint: false
tag: a4c-rvsf-vitg16-336-16f-pretrain-e141-bsz48-full-lrscaled-v2

experiment:
  classifier:
    num_heads: 16            # must divide 1408 (ViT-G)
    num_probe_blocks: 4
    # use_sdpa: true         # optional if supported

  data:
    dataset_type: VideoDataset
    dataset_train: /home/sagemaker-user/user-default-efs/vjepa2/data/a4c_rvfx_labels_train_full.csv
    dataset_val:   /home/sagemaker-user/user-default-efs/vjepa2/data/a4c_rvfx_labels_val_full.csv
    num_classes: 2
    resolution: 336
    frames_per_clip: 16
    frame_step: 3            # ~1s at ~50 fps
    num_segments: 1
    num_views_per_segment: 1
    pin_mem: true
    persistent_workers: true
    prefetch_factor: 4

  optimization:
    batch_size: 48           # per-GPU (effective = 48 * 8 = 384)
    use_bfloat16: true
    use_pos_embed: false

    # ---- Higher-LR tight grid (7 heads) for BS=48 ----
    multihead_kwargs:
      # wd = 0
      - { lr: 0.060, start_lr: 0.060, weight_decay: 0.0,   warmup: 0.05, final_lr: 0.0, final_weight_decay: 0.0 }
      - { lr: 0.040, start_lr: 0.040, weight_decay: 0.0,   warmup: 0.05, final_lr: 0.0, final_weight_decay: 0.0 }
      - { lr: 0.025, start_lr: 0.025, weight_decay: 0.0,   warmup: 0.02, final_lr: 0.0, final_weight_decay: 0.0 }

      # wd = 1e-4
      - { lr: 0.020, start_lr: 0.020, weight_decay: 0.0001, warmup: 0.05, final_lr: 0.0, final_weight_decay: 0.0001 }
      - { lr: 0.012, start_lr: 0.012, weight_decay: 0.0001, warmup: 0.02, final_lr: 0.0, final_weight_decay: 0.0001 }

      # wd = 1e-3
      - { lr: 0.012, start_lr: 0.012, weight_decay: 0.001,  warmup: 0.02, final_lr: 0.0, final_weight_decay: 0.001 }
      - { lr: 0.007, start_lr: 0.007, weight_decay: 0.001,  warmup: 0.00, final_lr: 0.0, final_weight_decay: 0.001 }

    num_epochs: 20           # JEPA-style probe eval; bump only if still undertraining

model_kwargs:
  checkpoint: "/home/sagemaker-user/user-default-efs/vjepa2/checkpoints/pretrain/keep/e141.pt"
  # Alternatives:
  # checkpoint: "/home/sagemaker-user/user-default-efs/vjepa2/checkpoints/anneal/1.8.vitg16-336px-16f-echo/e21.pt"
  # checkpoint: "/home/sagemaker-user/user-default-efs/vjepa2/checkpoints/vitg-384.pt"

  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_giant_xformers
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
