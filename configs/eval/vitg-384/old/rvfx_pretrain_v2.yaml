# A4C RV (tiny) — Frozen probe • ViT-G • BS=48/GPU • Parity finder v3
# Goal: match or beat the pink BS=8 run with a tight but slightly hotter LR band.

app: vjepa
cpus_per_task: 32
folder: /home/sagemaker-user/user-default-efs/vjepa2/evals/vitg-384/a4c_rv_overfit-c
mem_per_gpu: 80G
nodes: 1
tasks_per_node: 8
num_workers: 8

eval_name: video_classification_frozen
resume_checkpoint: false
tag: a4c-rv-overfit-vitg16-336-16f-pretrain-e141-bsz48-parity-v3

experiment:
  classifier:
    num_heads: 16
    num_probe_blocks: 4

  data:
    dataset_type: VideoDataset
    dataset_train: /home/sagemaker-user/user-default-efs/vjepa2/data/a4c_rvfx_labels_train_tiny.csv
    dataset_val:   /home/sagemaker-user/user-default-efs/vjepa2/data/a4c_rvfx_labels_val_tiny.csv
    num_classes: 2
    resolution: 336
    frames_per_clip: 16
    frame_step: 3
    num_segments: 1
    num_views_per_segment: 1
    pin_mem: true
    persistent_workers: true
    prefetch_factor: 4

  optimization:
    batch_size: 48
    use_bfloat16: true
    use_pos_embed: false

    # 8-way grid: push LR for low-noise BS=48; keep one low-LR anchor.
    # Warmup is a *fraction of epochs*; at 200 epochs, 0.08 = 16 epochs.
    multihead_kwargs:
      # ---- wd = 0 ----
      - { lr: 0.060, start_lr: 0.060, weight_decay: 0.0,    warmup: 0.08, final_lr: 0.0, final_weight_decay: 0.0 }
      - { lr: 0.045, start_lr: 0.045, weight_decay: 0.0,    warmup: 0.06, final_lr: 0.0, final_weight_decay: 0.0 }
      - { lr: 0.030, start_lr: 0.030, weight_decay: 0.0,    warmup: 0.05, final_lr: 0.0, final_weight_decay: 0.0 }
      - { lr: 0.015, start_lr: 0.015, weight_decay: 0.0,    warmup: 0.02, final_lr: 0.0, final_weight_decay: 0.0 }  # anchor

      # ---- wd = 1e-4 ----
      - { lr: 0.060, start_lr: 0.060, weight_decay: 0.0001, warmup: 0.08, final_lr: 0.0, final_weight_decay: 0.0001 }
      - { lr: 0.045, start_lr: 0.045, weight_decay: 0.0001, warmup: 0.06, final_lr: 0.0, final_weight_decay: 0.0001 }
      - { lr: 0.030, start_lr: 0.030, weight_decay: 0.0001, warmup: 0.05, final_lr: 0.0, final_weight_decay: 0.0001 }
      - { lr: 0.015, start_lr: 0.015, weight_decay: 0.0001, warmup: 0.02, final_lr: 0.0, final_weight_decay: 0.0001 }

    num_epochs: 200

model_kwargs:
  checkpoint: "/home/sagemaker-user/user-default-efs/vjepa2/checkpoints/pretrain/keep/e141.pt"
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_giant_xformers
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
