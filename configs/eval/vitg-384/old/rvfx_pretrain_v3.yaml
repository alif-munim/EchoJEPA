# A4C RV (tiny) — Frozen probe • ViT-G • BS=48/GPU
# Variant: Keep 16 heads / 4 blocks (paper setup) + mild LR decay
# Goal: run alongside your parity grid; only the schedule changes.

app: vjepa
cpus_per_task: 32
folder: /home/sagemaker-user/user-default-efs/vjepa2/evals/vitg-384/a4c_rv_overfit-c
mem_per_gpu: 80G
nodes: 1
tasks_per_node: 8
num_workers: 8

eval_name: video_classification_frozen
resume_checkpoint: false
tag: a4c-rv-vitg16-336-16f-pretrain-e141-bsz48-16h4b-cosdecay-v1

experiment:
  classifier:
    num_heads: 16           # paper setting
    num_probe_blocks: 4

  data:
    dataset_type: VideoDataset
    dataset_train: /home/sagemaker-user/user-default-efs/vjepa2/data/a4c_rvfx_labels_train_tiny.csv
    dataset_val:   /home/sagemaker-user/user-default-efs/vjepa2/data/a4c_rvfx_labels_val_tiny.csv
    num_classes: 2
    resolution: 336
    frames_per_clip: 16
    frame_step: 3
    num_segments: 1
    num_views_per_segment: 1
    pin_mem: true
    persistent_workers: true
    prefetch_factor: 4

  optimization:
    batch_size: 48
    use_bfloat16: true
    use_pos_embed: false

    # 8-way grid: same probe, different schedule (final_lr = 0.1 * start)
    multihead_kwargs:
      # ---- weight_decay = 0 ----
      - { lr: 0.050, start_lr: 0.050, weight_decay: 0.0,    warmup: 0.08, final_lr: 0.005,  final_weight_decay: 0.0 }
      - { lr: 0.035, start_lr: 0.035, weight_decay: 0.0,    warmup: 0.06, final_lr: 0.0035, final_weight_decay: 0.0 }
      - { lr: 0.022, start_lr: 0.022, weight_decay: 0.0,    warmup: 0.05, final_lr: 0.0022, final_weight_decay: 0.0 }
      - { lr: 0.015, start_lr: 0.015, weight_decay: 0.0,    warmup: 0.02, final_lr: 0.0015, final_weight_decay: 0.0 }

      # ---- weight_decay = 1e-4 ----
      - { lr: 0.050, start_lr: 0.050, weight_decay: 0.0001, warmup: 0.08, final_lr: 0.005,  final_weight_decay: 0.0001 }
      - { lr: 0.035, start_lr: 0.035, weight_decay: 0.0001, warmup: 0.06, final_lr: 0.0035, final_weight_decay: 0.0001 }
      - { lr: 0.022, start_lr: 0.022, weight_decay: 0.0001, warmup: 0.05, final_lr: 0.0022, final_weight_decay: 0.0001 }
      - { lr: 0.015, start_lr: 0.015, weight_decay: 0.0001, warmup: 0.02, final_lr: 0.0015, final_weight_decay: 0.0001 }

    num_epochs: 200

model_kwargs:
  checkpoint: "/home/sagemaker-user/user-default-efs/vjepa2/checkpoints/pretrain/keep/e141.pt"
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_giant_xformers
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
