# Linear probe baseline for PanEcho with FIXED normalization
# Must re-run to get correct baseline for verification comparison
# The ICML linear result (52.8%) used buggy normalization code
app: vjepa
cpus_per_task: 32
folder: /mnt/custom-file-systems/efs/fs-0049217cdf69186d7_fsap-0fa7145b64eaa046b/vjepa2/evals/vitg-384/classifier
mem_per_gpu: 80G
nodes: 1
tasks_per_node: 8
num_workers: 8

eval_name: video_classification_frozen
resume_checkpoint: false
tag: verify-panecho-linear

experiment:
  classifier:
    task_type: classification
    probe_type: linear
    num_heads: 16
    num_probe_blocks: 1
    use_layernorm: true
    dropout: 0.0

  data:
    dataset_type: VideoDataset
    dataset_train: /home/sagemaker-user/user-default-efs/vjepa2/data/csv/uhn_views_22k_train.csv
    dataset_val: /home/sagemaker-user/user-default-efs/vjepa2/data/csv/uhn_views_22k_val.csv
    num_classes: 13
    resolution: 224
    frames_per_clip: 16
    frame_step: 2
    num_segments: 2
    num_views_per_segment: 1

  optimization:
    batch_size: 1
    num_epochs: 20
    use_bfloat16: true
    use_pos_embed: false
    multihead_kwargs:
    - {lr: 0.001,  start_lr: 0.001,  warmup: 0.0, final_lr: 0.0, weight_decay: 0.0,   final_weight_decay: 0.0}
    - {lr: 0.001,  start_lr: 0.001,  warmup: 0.0, final_lr: 0.0, weight_decay: 0.001, final_weight_decay: 0.001}
    - {lr: 0.001,  start_lr: 0.001,  warmup: 0.0, final_lr: 0.0, weight_decay: 0.01,  final_weight_decay: 0.01}
    - {lr: 0.0005, start_lr: 0.0005, warmup: 0.0, final_lr: 0.0, weight_decay: 0.0,   final_weight_decay: 0.0}
    - {lr: 0.0005, start_lr: 0.0005, warmup: 0.0, final_lr: 0.0, weight_decay: 0.001, final_weight_decay: 0.001}
    - {lr: 0.0005, start_lr: 0.0005, warmup: 0.0, final_lr: 0.0, weight_decay: 0.01,  final_weight_decay: 0.01}
    - {lr: 0.0001, start_lr: 0.0001, warmup: 0.0, final_lr: 0.0, weight_decay: 0.0,   final_weight_decay: 0.0}
    - {lr: 0.0001, start_lr: 0.0001, warmup: 0.0, final_lr: 0.0, weight_decay: 0.001, final_weight_decay: 0.001}
    - {lr: 0.0001, start_lr: 0.0001, warmup: 0.0, final_lr: 0.0, weight_decay: 0.01,  final_weight_decay: 0.01}

model_kwargs:
  checkpoint: null
  module_name: evals.video_classification_frozen.modelcustom.panecho_encoder
  pretrain_kwargs: {}
  wrapper_kwargs: {}
