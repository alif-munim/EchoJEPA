# Verification experiment: EchoJEPA-G, depth=1 attentive probe
# Purpose: Confirm attentive probes >= linear for all architectures (see probe_implementation_analysis.md)
# Key changes from ICML: depth=1, 224px, 13 classes, 50 epochs, 5-epoch warmup, expanded HP grid
app: vjepa
cpus_per_task: 32
folder: /mnt/custom-file-systems/efs/fs-0049217cdf69186d7_fsap-0fa7145b64eaa046b/vjepa2/evals/vitg-384/classifier
mem_per_gpu: 80G
nodes: 1
tasks_per_node: 8
num_workers: 8

eval_name: video_classification_frozen
resume_checkpoint: false
tag: verify-echojepa-g-d1

experiment:
  classifier:
    num_heads: 16       # Divides all embed_dims: 512/16=32, 768/16=48, 1024/16=64, 1408/16=88
    num_probe_blocks: 1  # DEPTH=1: cross-attention only, no self-attention blocks

  data:
    dataset_type: VideoDataset
    dataset_train: /home/sagemaker-user/user-default-efs/vjepa2/data/csv/uhn_views_22k_train.csv
    dataset_val: /home/sagemaker-user/user-default-efs/vjepa2/data/csv/uhn_views_22k_val.csv
    num_classes: 13       # FIXED: all models use 13 classes (ICML had 11 for EchoJEPA)
    resolution: 224       # FIXED: all models use 224px (ICML had 336 for EchoJEPA)
    frames_per_clip: 16
    frame_step: 2
    num_segments: 2
    num_views_per_segment: 1

  optimization:
    batch_size: 1
    num_epochs: 50        # Generous (ICML: 20-30)
    use_bfloat16: true
    use_pos_embed: false
    multihead_kwargs:
    # LR=1e-3 x 4 WD values
    - {lr: 0.001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.001, final_weight_decay: 0.001}
    - {lr: 0.001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.01,  final_weight_decay: 0.01}
    - {lr: 0.001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.1,   final_weight_decay: 0.1}
    - {lr: 0.001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.4,   final_weight_decay: 0.4}
    # LR=5e-4
    - {lr: 0.0005, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.001, final_weight_decay: 0.001}
    - {lr: 0.0005, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.01,  final_weight_decay: 0.01}
    - {lr: 0.0005, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.1,   final_weight_decay: 0.1}
    - {lr: 0.0005, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.4,   final_weight_decay: 0.4}
    # LR=1e-4
    - {lr: 0.0001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.001, final_weight_decay: 0.001}
    - {lr: 0.0001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.01,  final_weight_decay: 0.01}
    - {lr: 0.0001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.1,   final_weight_decay: 0.1}
    - {lr: 0.0001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.4,   final_weight_decay: 0.4}
    # LR=5e-5
    - {lr: 0.00005, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.001, final_weight_decay: 0.001}
    - {lr: 0.00005, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.01,  final_weight_decay: 0.01}
    - {lr: 0.00005, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.1,   final_weight_decay: 0.1}
    - {lr: 0.00005, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.4,   final_weight_decay: 0.4}
    # LR=1e-5
    - {lr: 0.00001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.001, final_weight_decay: 0.001}
    - {lr: 0.00001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.01,  final_weight_decay: 0.01}
    - {lr: 0.00001, start_lr: 0.0, warmup: 5.0, final_lr: 0.0, weight_decay: 0.1,   final_weight_decay: 0.1}
