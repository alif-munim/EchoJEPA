# CLASSIFICATION CONFIG
app: vjepa
cpus_per_task: 32
folder: /home/sagemaker-user/user-default-efs/vjepa2/evals/vitg-384/rvsf_a4c
mem_per_gpu: 80G
nodes: 1
tasks_per_node: 8
num_workers: 8

eval_name: video_classification_frozen
resume_checkpoint: false
tag: rvsf-a4c-full-vitg16-336-16f-pt-e279-an-e78-fs2-ns2-pruned-v2

experiment:
  classifier:
    num_heads: 16           # ARCHITECTURE: Must divide 1408 (1408/16 = 88). Do not change.
    num_probe_blocks: 4     # Standard attentive probe depth

  data:
    dataset_type: VideoDataset
    dataset_train: /home/sagemaker-user/user-default-efs/vjepa2/data/csv/a4c_rvfx_labels_train_full.csv
    dataset_val:   /home/sagemaker-user/user-default-efs/vjepa2/data/csv/a4c_rvfx_labels_val_full.csv
    num_classes: 2
    resolution: 336
    frames_per_clip: 16
    
    # SAMPLING (Optimized for Cardiac Cycle)
    frame_step: 2           # ~1.28s context
    num_segments: 2         # Efficient temporal coverage
    num_views_per_segment: 1

  optimization:
    batch_size: 1
    # PRUNED GRID (6 Heads Total)
    multihead_kwargs:
    # --- Group 1: 1e-4 (Winner) ---
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.0001
      start_lr: 0.0001
      warmup: 0.0
      weight_decay: 0.4

    # --- Group 2: 5e-5 (Stability Check) ---
    - final_lr: 0.0
      final_weight_decay: 0.01
      lr: 0.00005
      start_lr: 0.00005
      warmup: 0.0
      weight_decay: 0.01
    - final_lr: 0.0
      final_weight_decay: 0.1
      lr: 0.00005
      start_lr: 0.00005
      warmup: 0.0
      weight_decay: 0.1
    - final_lr: 0.0
      final_weight_decay: 0.4
      lr: 0.00005
      start_lr: 0.00005
      warmup: 0.0
      weight_decay: 0.4
      
    num_epochs: 30
    use_bfloat16: true
    use_pos_embed: false

model_kwargs:
  checkpoint: "/home/sagemaker-user/user-default-efs/vjepa2/checkpoints/anneal/keep/pt-280-an81.pt"
  module_name: evals.video_classification_frozen.modelcustom.vit_encoder_multiclip
  
  pretrain_kwargs:
    encoder:
      checkpoint_key: target_encoder
      img_temporal_dim_size: null
      model_name: vit_giant_xformers
      patch_size: 16
      tubelet_size: 2
      uniform_power: true
      use_rope: true
      
  wrapper_kwargs:
    max_frames: 128
    use_pos_embed: false
    # MULTI-LAYER EXTRACTION: Critical for motion tasks
    # Assumes ViT-Giant (40 blocks). Adjust indices if using smaller model.
    out_layers: [36, 37, 38, 39]