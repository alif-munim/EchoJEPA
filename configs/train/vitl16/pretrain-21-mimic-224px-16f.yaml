# configs/train/vitl16/pretrain-21-mimic-224px-16f.yaml
# V-JEPA 2.1 domain adaptation on MIMIC-IV-Echo, starting from distilled ViT-L checkpoint.
# Uses context loss (predict_all) but keeps distilled architecture (pred_depth=12, levels=1).
#
# Launch:
#   python -m app.main --fname configs/train/vitl16/pretrain-21-mimic-224px-16f.yaml --devices cuda:0 cuda:1 cuda:2 cuda:3 cuda:4 cuda:5 cuda:6 cuda:7
app: vjepa_2_1
nodes: 1
tasks_per_node: 8
cpus_per_task: 16
mem_per_gpu: 220G
folder: /home/sagemaker-user/user-default-efs/vjepa2/checkpoints/pretrain_21/mimic/vjepa2_1_vitl_224px_16f

data:
  dataset_type: VideoDataset
  datasets:
    - /home/sagemaker-user/user-default-efs/vjepa2/data/csv/mimic_annotations_s3.csv
  datasets_weights: [1.0]
  batch_size: 128
  crop_size: 224
  patch_size: 16
  dataset_fpcs: [16]
  fps: 8
  tubelet_size: 2
  num_workers: 8
  persistent_workers: true
  pin_mem: true

data_aug:
  auto_augment: false
  motion_shift: false
  random_resize_aspect_ratio: [0.9, 1.1]    # tight for echo (nearly square)
  random_resize_scale: [0.5, 1.0]
  reprob: 0.0

loss:
  loss_exp: 1.0
  shift_by_n: 0
  predict_all: true              # V-JEPA 2.1 context loss
  weight_distance_loss: false    # simpler; enable for distance-weighted context loss
  offset_context_loss: false

mask:
  - aspect_ratio: [0.75, 1.5]
    full_complement: false
    max_keep: null
    max_temporal_keep: 1.0
    num_blocks: 8
    spatial_scale: [0.15, 0.15]
    temporal_scale: [1.0, 1.0]
  - aspect_ratio: [0.75, 1.5]
    full_complement: false
    max_keep: null
    max_temporal_keep: 1.0
    num_blocks: 2
    spatial_scale: [0.7, 0.7]
    temporal_scale: [1.0, 1.0]

meta:
  dtype: bfloat16
  eval_freq: 100
  load_checkpoint: false
  read_checkpoint: null
  save_every_freq: 5
  seed: 234
  use_sdpa: true

model:
  model_name: vit_large
  # Distilled model architecture (matches checkpoint)
  pred_depth: 12                  # distilled: 12, full 2.1: 24
  pred_embed_dim: 384
  pred_num_heads: 12
  n_output_distillation: 1        # distilled: 1 layer, full 2.1: 4
  # V-JEPA 2.1 features
  lambda_value_vid: 0.5           # context loss weight
  lambda_value_img: 0.5
  lambda_progressive: false        # constant lambda from step 0 (warmup thresholds are hardcoded for 135K+ step runs; our 36K steps would barely use context loss)
  levels_predictor: 1             # distilled: 1, full 2.1: 4
  normalize_predictor: false
  modality_embedding: true         # needed for checkpoint compat (has img/video mod embeds)
  img_temporal_dim_size: 1         # needed for checkpoint compat (has patch_embed_img)
  interpolate_rope: true
  # Standard settings
  uniform_power: true
  use_activation_checkpointing: true
  use_mask_tokens: true
  use_rope: true
  zero_init_mask_tokens: true
  has_cls_first: false
  is_causal: false
  pred_is_causal: false
  n_registers: 0
  n_registers_predictor: 0

optimization:
  # Force-load V-JEPA 2.1 distilled ViT-L checkpoint
  force_load_pretrain: true
  anneal_ckpt: /mnt/custom-file-systems/efs/fs-0049217cdf69186d7_fsap-0fa7145b64eaa046b/vjepa2/checkpoints/vjepa2_1_vitl.pt
  is_anneal: false

  ema: [0.99925, 0.99925]
  weight_decay: 0.04
  final_weight_decay: 0.04

  # LR scaled from paper: 5.25e-4 * (1024/3072) = 1.75e-4
  # Warmup → constant (final_lr = lr)
  start_lr: 3.33e-5
  lr: 1.75e-4
  final_lr: 1.75e-4

  ipe: 300
  ipe_scale: 1.25
  warmup: 40                     # 40 * 300 = 12K steps (matches paper)

  # 120 epochs * 300 ipe = 36K steps, ~70 passes through 525K samples
  # Paper does ~35 passes from scratch; 70 is reasonable for domain adaptation
  # Monitor val loss — reduce if overfitting. Set force_load_pretrain: false + load_checkpoint: true to resume
  epochs: 120
